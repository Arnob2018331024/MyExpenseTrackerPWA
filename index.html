<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Family Expense Tracker</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2cc185" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="manifest.json" />

    <style>
      :root {
        --bg-color: #f6f8fa;
        --card-bg: #ffffff;
        --primary: #2cc185;
        --primary-dark: #229969;
        --text-main: #2d3748;
        --text-muted: #718096;
        --border: #e2e8f0;
        --danger: #e53e3e;
        --success-bg: #d4edda;
        --success-text: #155724;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        padding-bottom: 80px; /* Space for bottom nav */
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 500px;
        padding: 20px;
      }

      header {
        width: 100%;
        max-width: 500px;
        padding: 20px 20px 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
      }

      /* Navigation Tabs */
      .page {
        display: none;
        width: 100%;
      }
      .page.active {
        display: block;
        animation: fadeIn 0.2s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Card Styles */
      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 2px 4px -1px rgba(0, 0, 0, 0.03);
        margin-bottom: 20px;
        border: 1px solid var(--border);
      }

      .card-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 15px;
        color: var(--text-main);
      }

      /* Form Inputs */
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text-muted);
      }
      input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 1rem;
        background: #f8fafc;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: var(--primary);
        background: #fff;
      }

      button.btn-submit {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        box-shadow: 0 4px 12px rgba(44, 193, 133, 0.2);
      }
      button.btn-submit:active {
        background: var(--primary-dark);
      }

      /* Dashboard Summary UI */
      .total-display {
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--text-main);
        margin-top: 5px;
      }

      /* Lists and Tables */
      .expense-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .expense-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .expense-row:last-child {
        border-bottom: none;
      }
      .row-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .row-category {
        font-weight: 600;
        font-size: 0.95rem;
      }
      .row-date {
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .row-amount {
        font-weight: 700;
        font-size: 1rem;
        color: var(--text-main);
      }

      /* History Architecture Layout */
      .history-table {
        width: 100%;
        border-collapse: collapse;
      }
      .history-table th {
        text-align: left;
        padding: 10px;
        font-size: 0.8rem;
        color: var(--text-muted);
        border-bottom: 2px solid var(--border);
      }
      .history-table td {
        padding: 12px 10px;
        font-size: 0.95rem;
        border-bottom: 1px solid var(--border);
      }
      .month-header-row td {
        background-color: #edf2f7;
        font-weight: 700;
        color: var(--text-main);
        font-size: 1rem;
        padding: 10px;
      }
      .month-total-row td {
        background-color: var(--success-bg);
        color: var(--success-text);
        font-weight: 700;
        padding: 12px 10px;
      }

      /* Native-style Mobile Bottom Navigation Bar */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 65px;
        background: var(--card-bg);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
        box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.03);
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        background: none;
        border: none;
        cursor: pointer;
        flex: 1;
        height: 100%;
        font-size: 0.75rem;
        font-weight: 500;
        gap: 4px;
      }
      .nav-item.active {
        color: var(--primary);
        font-weight: 700;
      }
      .nav-icon {
        font-size: 1.4rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="pageTitle">Dashboard</h1>
    </header>

    <div class="container">
      <!-- PAGE 1: DASHBOARD -->
      <div id="dashboardPage" class="page active">
        <div class="card">
          <div class="card-title" id="currentMonthName">
            This Month's Spending
          </div>
          <div class="total-display" id="monthTotal">0.00 BDT</div>
        </div>

        <div class="card">
          <div class="card-title">Log New Expense</div>
          <form id="expenseForm" autocomplete="off">
            <div class="form-group">
              <label for="amount">AMOUNT (BDT)</label>
              <input
                type="number"
                id="amount"
                step="0.01"
                inputmode="decimal"
                required
                placeholder="0.00"
              />
            </div>
            <div class="form-group">
              <label for="category">SECTION / CATEGORY</label>
              <input
                type="text"
                id="category"
                list="categories"
                required
                placeholder="Rent, Food, Utilities"
              />
              <datalist id="categories"></datalist>
            </div>
            <button type="submit" class="btn-submit">Save Transaction</button>
          </form>
        </div>

        <div class="card">
          <div class="card-title">Recent Entries</div>
          <div id="monthList" class="expense-list"></div>
        </div>
      </div>

      <!-- PAGE 2: HISTORY -->
      <div id="historyPage" class="page">
        <div class="card" style="padding: 10px; overflow-x: auto">
          <table class="history-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Section</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Sticky Native Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="switchTab('dashboard')">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" onclick="switchTab('history')">
        <span class="nav-icon">📜</span>
        <span>All History</span>
      </button>
    </nav>

    <script>
      // Core App Logic & State management
      let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

      const form = document.getElementById("expenseForm");
      const amountInput = document.getElementById("amount");
      const categoryInput = document.getElementById("category");
      const datalist = document.getElementById("categories");
      const monthTotalEl = document.getElementById("monthTotal");
      const monthListEl = document.getElementById("monthList");
      const historyBody = document.getElementById("historyBody");
      const currentMonthNameEl = document.getElementById("currentMonthName");

      // Clean utility conversions
      const getYearMonthStr = (date = new Date()) =>
        date.toISOString().substring(0, 7);
      const getTodayStr = () => {
        const tzoffset = new Date().getTimezoneOffset() * 60000;
        return new Date(Date.now() - tzoffset).toISOString().substring(0, 10);
      };

      function switchTab(tab) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".nav-item")
          .forEach((n) => n.classList.remove("active"));

        if (event && event.currentTarget) {
          event.currentTarget.classList.add("active");
        }

        if (tab === "dashboard") {
          document.getElementById("dashboardPage").classList.add("active");
          document.getElementById("pageTitle").textContent = "Dashboard";
          renderDashboard();
        } else {
          document.getElementById("historyPage").classList.add("active");
          document.getElementById("pageTitle").textContent = "Archived Logs";
          renderHistory();
        }
      }

      function updateCategoryOptions() {
        const categories = [...new Set(expenses.map((e) => e.category))];
        datalist.innerHTML = categories
          .map((c) => `<option value="${c}">`)
          .join("");
      }

      function renderDashboard() {
        const currentMonth = getYearMonthStr();
        const localizedMonth = new Date().toLocaleDateString("en-US", {
          month: "long",
          year: "numeric",
        });
        currentMonthNameEl.textContent = `${localizedMonth} Balance`;

        const thisMonthsExpenses = expenses.filter((e) =>
          e.date.startsWith(currentMonth),
        );
        const total = thisMonthsExpenses.reduce(
          (sum, e) => sum + parseFloat(e.amount),
          0,
        );

        monthTotalEl.textContent = `${total.toFixed(2)} BDT`;
        thisMonthsExpenses.sort((a, b) => b.timestamp - a.timestamp);

        monthListEl.innerHTML =
          thisMonthsExpenses
            .slice(0, 15)
            .map(
              (e) => `
                <div class="expense-row">
                    <div class="row-left">
                        <span class="row-category">${e.category}</span>
                        <span class="row-date">${e.date}</span>
                    </div>
                    <span class="row-amount">${parseFloat(e.amount).toFixed(2)} BDT</span>
                </div>
            `,
            )
            .join("") ||
          '<div style="text-align:center; padding:20px; color:var(--text-muted)">No metrics logged this month.</div>';

        updateCategoryOptions();
      }

      function renderHistory() {
        if (expenses.length === 0) {
          historyBody.innerHTML =
            '<tr><td colspan="3" style="text-align:center; color:var(--text-muted)">Empty logging ledger.</td></tr>';
          return;
        }

        expenses.sort(
          (a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp,
        );

        const groups = {};
        expenses.forEach((e) => {
          const mStr = e.date.substring(0, 7);
          if (!groups[mStr]) groups[mStr] = [];
          groups[mStr].push(e);
        });

        let htmlString = "";
        for (const month in groups) {
          const dateHeader = new Date(month + "-02");
          const title = dateHeader.toLocaleDateString("en-US", {
            month: "long",
            year: "numeric",
          });

          htmlString += `<tr class="month-header-row"><td colspan="3">${title}</td></tr>`;

          let subtotal = 0;
          groups[month].forEach((e) => {
            subtotal += parseFloat(e.amount);
            htmlString += `
                        <tr>
                            <td>${e.date.substring(5)}</td>
                            <td>${e.category}</td>
                            <td>${parseFloat(e.amount).toFixed(2)} BDT</td>
                        </tr>
                    `;
          });

          htmlString += `
                    <tr class="month-total-row">
                        <td colspan="2">Total Spend</td>
                        <td>${subtotal.toFixed(2)} BDT</td>
                    </tr>
                `;
        }
        historyBody.innerHTML = htmlString;
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const amt = parseFloat(amountInput.value);
        const cat = categoryInput.value.trim();

        if (!amt || !cat) return;

        expenses.push({
          id: Date.now(),
          timestamp: Date.now(),
          amount: amt,
          category: cat,
          date: getTodayStr(),
        });

        localStorage.setItem("expenses", JSON.stringify(expenses));
        form.reset();
        renderDashboard();

        monthTotalEl.style.transform = "scale(1.05)";
        setTimeout(() => (monthTotalEl.style.transform = "scale(1)"), 150);
      });

      // Initialize execution on mount
      renderDashboard();
    </script>

    <!-- Register Service Worker for PWA compliance -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
